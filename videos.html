  <style>
    .chaos-wall {
      position: relative;
      width: 100%;
      height: clamp(520px, 72vh, 820px);
      margin: 0 0 38px;
      overflow: hidden;
      isolation: isolate;
      background: #000;
      border: 4px solid #3fa27a;
      box-shadow: 0 0 18px rgba(63, 162, 122, .82), 0 24px 60px rgba(0, 0, 0, .38);
      color: #0f0;
      font-family: "Press Start 2P", var(--dot), monospace;
    }

    .chaos-wall:fullscreen,
    .chaos-wall:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      margin: 0;
      border: 0;
    }

    .chaos-wall-heading {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .chaos-video-wall {
      position: absolute;
      inset: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      background: #000;
    }

    .chaos-scroll-row {
      display: flex;
      flex: 0 0 auto;
      width: max-content;
      will-change: transform;
    }

    .chaos-video-wall video {
      flex: 0 0 auto;
      width: 400px;
      height: 300px;
      object-fit: cover;
      margin: 6px;
      border: 4px solid #3fa27a;
      box-shadow: 0 0 12px #3fa27a;
      background: #111;
    }

    .chaos-row-1 { animation: chaosScrollLeft 70s linear infinite; }
    .chaos-row-2 { animation: chaosScrollRight 90s linear infinite; }
    .chaos-row-3 { animation: chaosScrollLeft 110s linear infinite; }

    @keyframes chaosScrollLeft {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    @keyframes chaosScrollRight {
      from { transform: translateX(-50%); }
      to { transform: translateX(0); }
    }

    .chaos-wall-control {
      position: absolute;
      top: 10px;
      z-index: 6;
      appearance: none;
      background: #111;
      color: #0f0;
      border: 2px solid #3fa27a;
      border-radius: 0;
      box-shadow: 0 0 8px rgba(63, 162, 122, .7);
      font: inherit;
      font-size: 11px;
      line-height: 1.3;
      padding: 8px 12px;
      cursor: pointer;
    }

    .chaos-wall-control:hover,
    .chaos-wall-control:focus-visible {
      background: #18382d;
      outline: 2px solid #0f0;
      outline-offset: 2px;
    }

    #chaos-audio-toggle { right: 10px; }
    #chaos-fullscreen-toggle { right: 162px; }

    @media (max-width: 768px) {
      .chaos-wall {
        height: min(590px, 72vh);
        min-height: 470px;
        margin-bottom: 28px;
        border-width: 3px;
      }

      .chaos-video-wall video {
        width: 240px;
        height: 180px;
        margin: 3px;
        border-width: 3px;
      }

      .chaos-wall-control {
        top: 8px;
        font-size: 9px;
        padding: 7px 8px;
      }

      #chaos-audio-toggle { right: 8px; }
      #chaos-fullscreen-toggle { left: 8px; right: auto; }
    }

    @media (prefers-reduced-motion: reduce) {
      .chaos-scroll-row { animation-play-state: paused; }
    }
  </style>
</head>
<body class="inner page-videos">

  <main class="inner-main" id="content">
    <header class="page-heading"><p class="kicker">Films and performances</p><h1>Videos</h1><p>Listen. Watch. Enjoy.</p></header>

    <section class="chaos-wall" id="chaos-wall" aria-labelledby="chaos-wall-heading">
      <h2 class="chaos-wall-heading" id="chaos-wall-heading">Retro Video Wall — Chaos Mode</h2>
      <div class="chaos-video-wall" aria-hidden="true">
        <div class="chaos-scroll-row chaos-row-1" id="chaos-row-1"></div>
        <div class="chaos-scroll-row chaos-row-2" id="chaos-row-2"></div>
        <div class="chaos-scroll-row chaos-row-3" id="chaos-row-3"></div>
      </div>
      <button class="chaos-wall-control" id="chaos-fullscreen-toggle" type="button" aria-pressed="false">⛶ Fullscreen</button>
      <button class="chaos-wall-control" id="chaos-audio-toggle" type="button" aria-pressed="false">🔇 Sound Off</button>
    </section>

    <section class="video-grid" id="video-grid" aria-label="Featured videos"></section>
  </main>
  <dialog class="media-dialog" id="video-dialog"><div class="dialog-bar"><h2 id="dialog-title">Video</h2><button class="chrome-button" id="dialog-close" type="button" aria-label="Close">×</button></div><video id="dialog-video" controls playsinline></video></dialog>

  <script src="assets/js/catalog.js?v=20260714-4"></script><script src="assets/js/common.js?v=20260715-1"></script><script src="assets/js/videos.js?v=20260714-3"></script>
  <script>
    (() => {
      const source = "https://img1.wsimg.com/blobby/go/fcde905d-e711-4bbd-8961-6b9df0cf58b2/downloads/2fa91723-c825-4b8d-8c38-41dbc40548fd/ICE%20CASTLES%20FROM%20THE%20SUN%20_%20Indie%20Alt%20Rock%2090s%20.mp4?ver=1758174275544&download=1";
      const wall = document.getElementById("chaos-wall");
      const audioToggle = document.getElementById("chaos-audio-toggle");
      const fullscreenToggle = document.getElementById("chaos-fullscreen-toggle");
      let mainVideo = null;
      let soundOn = false;

      const fillRow = (rowId, numVideos, isFirstRow = false) => {
        const row = document.getElementById(rowId);
        if (!row) return;

        for (let index = 0; index < numVideos; index += 1) {
          const video = document.createElement("video");
          video.src = source;
          video.autoplay = true;
          video.loop = true;
          video.playsInline = true;
          video.muted = true;
          video.defaultMuted = true;
          video.preload = "metadata";
          video.setAttribute("playsinline", "");
          video.setAttribute("disablepictureinpicture", "");

          if (isFirstRow && index === 0) mainVideo = video;
          row.appendChild(video);
        }
      };

      fillRow("chaos-row-1", 8, true);
      fillRow("chaos-row-2", 10);
      fillRow("chaos-row-3", 7);

      audioToggle?.addEventListener("click", async () => {
        if (!mainVideo) return;
        soundOn = !soundOn;
        mainVideo.muted = !soundOn;
        mainVideo.volume = .4;

        if (soundOn) {
          try {
            await mainVideo.play();
          } catch (error) {
            soundOn = false;
            mainVideo.muted = true;
          }
        }

        audioToggle.textContent = soundOn ? "🔊 Sound On" : "🔇 Sound Off";
        audioToggle.setAttribute("aria-pressed", String(soundOn));
      });

      fullscreenToggle?.addEventListener("click", async () => {
        if (!wall) return;

        try {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            const request = wall.requestFullscreen || wall.webkitRequestFullscreen;
            if (request) await request.call(wall);
          } else {
            const exit = document.exitFullscreen || document.webkitExitFullscreen;
            if (exit) await exit.call(document);
          }
        } catch (error) {
          fullscreenToggle.setAttribute("aria-pressed", "false");
        }
      });

      const syncFullscreenButton = () => {
        const active = document.fullscreenElement === wall || document.webkitFullscreenElement === wall;
        fullscreenToggle.textContent = active ? "↙ Exit Fullscreen" : "⛶ Fullscreen";
        fullscreenToggle.setAttribute("aria-pressed", String(active));
      };

      document.addEventListener("fullscreenchange", syncFullscreenButton);
      document.addEventListener("webkitfullscreenchange", syncFullscreenButton);
    })();
  </script>
</body></html>
