  <style>
    .ice-triptych {
      position: relative;
      width: 100%;
      margin: 48px 0 0;
      padding: clamp(14px, 2vw, 24px);
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(180deg, rgba(4, 12, 13, .84), rgba(1, 5, 8, .96)),
        repeating-linear-gradient(90deg, transparent 0 11px, rgba(63, 162, 122, .08) 11px 12px);
      border: 4px solid #3fa27a;
      box-shadow: 0 0 18px rgba(63, 162, 122, .72), 0 24px 60px rgba(0, 0, 0, .38);
      color: #0f0;
      font-family: "Press Start 2P", var(--dot), monospace;
    }

    .ice-triptych-heading {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .ice-triptych-stage {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(10px, 1.4vw, 22px);
      width: min(100%, 1040px);
      margin: 0 auto;
      align-items: center;
    }

    .ice-triptych-panel {
      position: relative;
      aspect-ratio: 9 / 16;
      min-width: 0;
      overflow: hidden;
      background: #050707;
      border: 3px solid #3fa27a;
      box-shadow:
        inset 0 0 0 1px rgba(210, 255, 239, .16),
        0 0 18px rgba(63, 162, 122, .48);
    }

    .ice-triptych-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 18%, transparent 82%, rgba(0,0,0,.22)),
        repeating-linear-gradient(180deg, transparent 0 3px, rgba(0,0,0,.08) 3px 4px);
      mix-blend-mode: screen;
    }

    .ice-triptych-panel video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #050707;
    }

    .ice-triptych-panel--left video { object-position: 22% center; }
    .ice-triptych-panel--center video { object-position: 50% center; }
    .ice-triptych-panel--right video { object-position: 78% center; }

    .ice-triptych-controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .ice-triptych-control {
      appearance: none;
      background: #111;
      color: #0f0;
      border: 2px solid #3fa27a;
      border-radius: 0;
      box-shadow: 0 0 8px rgba(63, 162, 122, .55);
      font: inherit;
      font-size: 10px;
      line-height: 1.3;
      padding: 8px 12px;
      cursor: pointer;
    }

    .ice-triptych-control:hover,
    .ice-triptych-control:focus-visible {
      background: #18382d;
      outline: 2px solid #0f0;
      outline-offset: 2px;
    }

    .ice-triptych:fullscreen,
    .ice-triptych:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      margin: 0;
      border: 0;
      display: grid;
      align-content: center;
    }

    .ice-triptych:fullscreen .ice-triptych-stage,
    .ice-triptych:-webkit-full-screen .ice-triptych-stage {
      width: min(94vw, 1120px);
      height: min(84vh, 820px);
    }

    .ice-triptych:fullscreen .ice-triptych-panel,
    .ice-triptych:-webkit-full-screen .ice-triptych-panel {
      height: 100%;
      width: auto;
      justify-self: center;
    }

    @media (max-width: 768px) {
      .ice-triptych {
        margin-top: 34px;
        padding: 12px;
        border-width: 3px;
      }

      .ice-triptych-stage {
        display: block;
        width: min(100%, 390px);
      }

      .ice-triptych-panel--left,
      .ice-triptych-panel--right {
        display: none;
      }

      .ice-triptych-panel--center {
        width: 100%;
      }

      .ice-triptych-control {
        font-size: 9px;
        padding: 7px 9px;
      }

      .ice-triptych:fullscreen .ice-triptych-stage,
      .ice-triptych:-webkit-full-screen .ice-triptych-stage {
        width: min(92vw, 430px);
        height: auto;
      }

      .ice-triptych:fullscreen .ice-triptych-panel--center,
      .ice-triptych:-webkit-full-screen .ice-triptych-panel--center {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>

  <main class="inner-main" id="content">
    <header class="page-heading"><p class="kicker">Films and performances</p><h1>Videos</h1><p>Listen. Watch. Enjoy.</p></header>

    <section class="video-grid" id="video-grid" aria-label="Featured videos"></section>

    <section class="ice-triptych" id="ice-triptych" aria-labelledby="ice-triptych-heading">
      <h2 class="ice-triptych-heading" id="ice-triptych-heading">Ice Castles From the Sun synchronized portrait triptych</h2>
      <div class="ice-triptych-stage">
        <div class="ice-triptych-panel ice-triptych-panel--left" aria-hidden="true">
          <video class="ice-triptych-video" autoplay muted loop playsinline preload="metadata" disablepictureinpicture></video>
        </div>
        <div class="ice-triptych-panel ice-triptych-panel--center">
          <video class="ice-triptych-video" id="ice-triptych-master" autoplay muted loop playsinline preload="metadata" aria-label="Ice Castles From the Sun" disablepictureinpicture></video>
        </div>
        <div class="ice-triptych-panel ice-triptych-panel--right" aria-hidden="true">
          <video class="ice-triptych-video" autoplay muted loop playsinline preload="metadata" disablepictureinpicture></video>
        </div>

      <div class="ice-triptych-controls" aria-label="Ice Castles triptych controls">
        <button class="ice-triptych-control" id="ice-triptych-play" type="button" aria-pressed="true">❚❚ Pause</button>
        <button class="ice-triptych-control" id="ice-triptych-audio" type="button" aria-pressed="false">🔇 Sound Off</button>

      </div>

  <dialog class="media-dialog" id="video-dialog"><div class="dialog-bar"><h2 id="dialog-title">Video</h2><button class="chrome-button" id="dialog-close" type="button" aria-label="Close">×</button></div><video id="dialog-video" controls playsinline></video></dialog>

  <script src="assets/js/catalog.js?v=20260714-4"></script><script src="assets/js/common.js?v=20260715-1"></script><script src="assets/js/videos.js?v=20260714-3"></script>
  <script>
    (() => {
      const source = "https://img1.wsimg.com/blobby/go/fcde905d-e711-4bbd-8961-6b9df0cf58b2/downloads/2fa91723-c825-4b8d-8c38-41dbc40548fd/ICE%20CASTLES%20FROM%20THE%20SUN%20_%20Indie%20Alt%20Rock%2090s%20.mp4?ver=1758174275544&download=1";
      const section = document.getElementById("ice-triptych");
      const videos = Array.from(document.querySelectorAll(".ice-triptych-video"));
      const master = document.getElementById("ice-triptych-master");
      const playButton = document.getElementById("ice-triptych-play");
      const audioButton = document.getElementById("ice-triptych-audio");
      const fullscreenButton = document.getElementById("ice-triptych-fullscreen");
      const desktopQuery = window.matchMedia("(min-width: 769px)");
      let soundOn = false;

      if (!section || !master || !videos.length) return;

      videos.forEach((video) => {
        video.src = source;
        video.muted = true;
        video.defaultMuted = true;
        video.volume = .45;
      });

      const visibleVideos = () => desktopQuery.matches ? videos : [master];

      const updatePlayButton = () => {
        const playing = !master.paused;
        playButton.textContent = playing ? "❚❚ Pause" : "▶ Play";
        playButton.setAttribute("aria-pressed", String(playing));
      };

      const alignFollowers = (force = false) => {
        if (!desktopQuery.matches) return;
        videos.forEach((video) => {
          if (video === master || !Number.isFinite(master.currentTime)) return;
          const drift = Math.abs(video.currentTime - master.currentTime);
          if (force || drift > .10) video.currentTime = master.currentTime;
          video.playbackRate = master.playbackRate;
        });
      };

      const playVisible = async () => {
        const active = visibleVideos();
        active.forEach((video) => {
          if (video !== master) video.currentTime = master.currentTime;
        });
        await Promise.allSettled(active.map((video) => video.play()));
        updatePlayButton();
      };

      const pauseAll = () => {
        videos.forEach((video) => video.pause());
        updatePlayButton();
      };

      playButton?.addEventListener("click", () => {
        if (master.paused) playVisible();
        else pauseAll();
      });

      audioButton?.addEventListener("click", async () => {
        soundOn = !soundOn;
        master.muted = !soundOn;
        master.volume = .45;
        if (soundOn && master.paused) await playVisible();
        audioButton.textContent = soundOn ? "🔊 Sound On" : "🔇 Sound Off";
        audioButton.setAttribute("aria-pressed", String(soundOn));
      });

      fullscreenButton?.addEventListener("click", async () => {
        try {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            const request = section.requestFullscreen || section.webkitRequestFullscreen;
            if (request) await request.call(section);
          } else {
            const exit = document.exitFullscreen || document.webkitExitFullscreen;
            if (exit) await exit.call(document);
          }
        } catch (error) {
          fullscreenButton.setAttribute("aria-pressed", "false");
        }
      });

      const syncFullscreenButton = () => {
        const active = document.fullscreenElement === section || document.webkitFullscreenElement === section;
        fullscreenButton.textContent = active ? "↙ Exit Fullscreen" : "⛶ Fullscreen";
        fullscreenButton.setAttribute("aria-pressed", String(active));
      };

      const updateLayoutPlayback = () => {
        if (desktopQuery.matches) {
          alignFollowers(true);
          if (!master.paused) playVisible();
        } else {
          videos.forEach((video) => {
            if (video !== master) video.pause();
          });
        }
      };

      master.addEventListener("playing", () => {
        alignFollowers(true);
        if (desktopQuery.matches) {
          videos.forEach((video) => {
            if (video !== master) video.play().catch(() => {});
          });
        }
        updatePlayButton();
      });
      master.addEventListener("pause", updatePlayButton);
      master.addEventListener("seeking", () => alignFollowers(true));
      master.addEventListener("ratechange", () => alignFollowers(true));
      master.addEventListener("loadedmetadata", () => playVisible());

      document.getElementById("video-grid")?.addEventListener("click", pauseAll, true);
      document.addEventListener("fullscreenchange", syncFullscreenButton);
      document.addEventListener("webkitfullscreenchange", syncFullscreenButton);
      desktopQuery.addEventListener?.("change", updateLayoutPlayback);

      window.setInterval(() => {
        if (!master.paused) alignFollowers(false);
      }, 250);
    })();
  </script>
