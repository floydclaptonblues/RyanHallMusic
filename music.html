<html lang="en">

<body class="inner">

  <header class="site-header">

    <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">☰</button>
    <nav class="main-nav" aria-label="Primary navigation">
      <a href="index.html">Home</a><a href="music.html" aria-current="page">Music</a><a href="videos.html">Videos</a><a href="pictures.html">Pictures</a><a href="contact.html">Contact</a>

      <h1>Music</h1>

    </header>
    <section class="music-grid" id="music-grid" aria-label="Music catalog"></section>

      </div>

    <canvas class="visualizer" id="visualizer" width="280" height="84" aria-hidden="true"></canvas>
    <audio id="audio" preload="metadata"></audio>
  </div>
  <footer class="site-footer">Ryan Hall · <span data-year></span></footer>
